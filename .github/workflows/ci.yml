name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run lint

      - name: Type-check extension
        run: npx tsc -p ./ --noEmit

      - name: Type-check CLI
        run: npx tsc -p ./tsconfig.cli.json --noEmit

      - name: Build both targets
        run: npm run build

      - name: Run tests
        run: xvfb-run -a npm test
